server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Long-cache the immutable Next.js static bundle
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API traffic to the in-cluster backend Service. This is what makes
  # the frontend + backend look like one origin to the browser — no CORS, no
  # separate Tailscale-served port for the API.
  #
  # No `resolver` directive: nginx resolves the hostname once at startup via
  # /etc/resolv.conf (which the Pod inherits with the cluster DNS server).
  # Service IP is stable for the Service's lifetime; restart the frontend
  # Deployment if you ever delete+recreate the backend Service.
  location /api/ {
    proxy_pass http://khata-backend.khata.svc.cluster.local:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    proxy_buffering off;            # stream large bodies (e.g. receipt images) without buffering
    client_max_body_size 25m;       # accommodate receipt PDFs / images
    proxy_read_timeout 300s;        # OCR + LLM calls can be slow
  }

  # Health endpoint (also on the backend; routed there)
  location = /health {
    proxy_pass http://khata-backend.khata.svc.cluster.local:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # SPA-style routing: try the literal path, then path/index.html, then root.
  # Next.js static export emits <route>/index.html per route.
  location / {
    try_files $uri $uri/index.html /index.html;
  }
}
