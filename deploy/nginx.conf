server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Long-cache the immutable Next.js static bundle
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA-style routing: try the literal path, then path/index.html, then root.
  # Next.js static export emits <route>/index.html per route.
  location / {
    try_files $uri $uri/index.html /index.html;
  }
}
