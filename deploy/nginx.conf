server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  server_tokens off;

  # Security headers (audit 2026-06-19 M13). frame-ancestors lets the Telegram
  # Mini-App webview embed the dashboard while blocking other origins
  # (clickjacking). A full default-src CSP is intentionally omitted — the
  # Next.js static export relies on inline bootstrap scripts.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;

  # Long-cache the immutable Next.js static bundle
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    # nginx drops inherited add_header directives in any location that sets its
    # own, so re-declare the security headers here (M13).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    try_files $uri =404;
  }

  # Proxy API traffic to the in-cluster backend Service. This is what makes
  # the frontend + backend look like one origin to the browser — no CORS, no
  # separate Tailscale-served port for the API.
  #
  # No `resolver` directive: nginx resolves the hostname once at startup via
  # /etc/resolv.conf (which the Pod inherits with the cluster DNS server).
  # Service IP is stable for the Service's lifetime; restart the frontend
  # Deployment if you ever delete+recreate the backend Service.
  location /api/ {
    proxy_pass http://khata-backend.khata.svc.cluster.local:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    proxy_buffering off;            # stream large bodies (e.g. receipt images) without buffering
    client_max_body_size 25m;       # accommodate receipt PDFs / images
    proxy_read_timeout 300s;        # OCR + LLM calls can be slow
  }

  # Health endpoint (also on the backend; routed there)
  location = /health {
    proxy_pass http://khata-backend.khata.svc.cluster.local:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # SPA-style routing for Next.js static export. The export emits FLAT files
  # (login.html, dashboard.html, transactions.html, receipts.html) — not
  # nested directories. Order: literal $uri, then $uri.html, then index.html
  # as the fallback.
  location / {
    try_files $uri $uri.html $uri/index.html /index.html;
  }
}
