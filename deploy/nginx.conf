# DNS resolver for in-cluster Service hostname (kube-dns / coredns).
# Required because nginx resolves `proxy_pass` hostnames at startup unless
# you point at a `resolver`. We give it the cluster DNS + a short TTL so
# Service IP changes get picked up.
resolver kubernetes.default.svc.cluster.local valid=30s;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Long-cache the immutable Next.js static bundle
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API traffic to the in-cluster backend Service. This is what makes
  # the frontend + backend look like one origin to the browser — no CORS, no
  # separate Tailscale-served port for the API.
  #
  # Use a `set` + variable in proxy_pass so nginx defers DNS lookup to
  # request time (otherwise it resolves at startup and caches forever).
  location /api/ {
    set $backend "khata-backend.khata.svc.cluster.local:3001";
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    proxy_buffering off;            # stream large bodies (e.g. receipt images) without buffering
    client_max_body_size 25m;       # accommodate receipt PDFs / images
    proxy_read_timeout 300s;        # OCR + LLM calls can be slow
  }

  # Health endpoint (also on the backend; routed there)
  location = /health {
    set $backend "khata-backend.khata.svc.cluster.local:3001";
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # SPA-style routing: try the literal path, then path/index.html, then root.
  # Next.js static export emits <route>/index.html per route.
  location / {
    try_files $uri $uri/index.html /index.html;
  }
}
