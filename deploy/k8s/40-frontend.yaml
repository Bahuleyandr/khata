apiVersion: apps/v1
kind: Deployment
metadata:
  name: khata-frontend
  namespace: khata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: khata-frontend
  template:
    metadata:
      labels:
        app: khata-frontend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: khata-frontend:latest
          imagePullPolicy: Never # built locally + loaded via `k3s ctr images import`
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: khata-frontend
  namespace: khata
spec:
  type: NodePort
  selector:
    app: khata-frontend
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080 # fixed so `tailscale serve` can target a stable URL
      name: http
