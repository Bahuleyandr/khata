apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: khata-postgres-data
  namespace: khata
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  # storageClassName left unset → uses the cluster default (k3s ships
  # local-path-provisioner enabled out of the box).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khata-postgres
  namespace: khata
spec:
  replicas: 1
  strategy:
    type: Recreate # single-instance + PVC RWO; rolling would deadlock
  selector:
    matchLabels:
      app: khata-postgres
  template:
    metadata:
      labels:
        app: khata-postgres
    spec:
      # Run non-root (audit 2026-06-19 M13). uid 70 = 'postgres' in the alpine
      # image; fsGroup 70 chowns the PVC group so the non-root process can write
      # it, and PGDATA is a subdir (set below) that initdb creates owned by 70.
      # OPERATOR: a FRESH PVC initializes cleanly; if this PVC was previously
      # initialized as root, chown its pgdata to 70:70 (or recreate it) before
      # applying, and confirm the pod reaches Ready on first apply.
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.8-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: khata
            - name: POSTGRES_USER
              value: khata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khata-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "khata"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "khata"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: khata-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: khata-postgres
  namespace: khata
spec:
  selector:
    app: khata-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
