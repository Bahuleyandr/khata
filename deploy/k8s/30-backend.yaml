apiVersion: apps/v1
kind: Deployment
metadata:
  name: khata-backend
  namespace: khata
spec:
  replicas: 1
  strategy:
    # Telegram only allows one long-poll client per bot at a time. A rolling
    # update starts the new pod before killing the old one, which races on
    # `getUpdates` and 409s the new pod (it crashes once, then recovers when
    # the old pod is gone). Recreate kills the old pod first — no overlap.
    type: Recreate
  selector:
    matchLabels:
      app: khata-backend
  template:
    metadata:
      labels:
        app: khata-backend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: khata-backend:latest
          imagePullPolicy: Never # built locally + loaded via `k3s ctr images import`
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: khata-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            # The app connects as the least-privilege khata_app role (audit
            # 2026-06-19 M5), NOT the owner — it can do DML but cannot disable
            # the month-close immutability triggers. APP_DB_PASSWORD is
            # redeclared so the kubelet expands it inside DATABASE_URL.
            # ORDERING: the khata_app role + its password are provisioned by
            # `migrate` (run as the owner with APP_DB_PASSWORD set) and migration
            # 035 — run that BEFORE this pod starts, or it cannot connect. See
            # the deploy runbook.
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khata-secrets
                  key: APP_DB_PASSWORD
            - name: DATABASE_URL
              value: postgres://khata_app:$(APP_DB_PASSWORD)@khata-postgres.khata.svc.cluster.local:5432/khata
            # Same-origin in production (frontend + backend on one Tailscale
            # hostname via Traefik path routing). Localhost stays in the list
            # so port-forward dev still works.
            - name: ALLOWED_ORIGINS
              value: http://localhost:3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi # Node + Python MCP subprocess share this Pod
---
apiVersion: v1
kind: Service
metadata:
  name: khata-backend
  namespace: khata
spec:
  selector:
    app: khata-backend
  ports:
    - port: 3001
      targetPort: 3001
      name: http
