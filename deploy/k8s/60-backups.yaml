apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: khata-backups-data
  namespace: khata
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: khata-postgres-backup
  namespace: khata
spec:
  schedule: "30 18 * * *" # 00:00 IST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-dump
              image: postgres:16.8-alpine
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: khata-secrets
                      key: POSTGRES_PASSWORD
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  stamp="$(date -u +%Y%m%dT%H%M%SZ)"
                  pg_dump \
                    --host=khata-postgres.khata.svc.cluster.local \
                    --username=khata \
                    --dbname=khata \
                    --format=custom \
                    --no-owner \
                    --no-acl \
                    --file="/backups/khata-postgres-${stamp}.dump"
                  find /backups -type f -name 'khata-postgres-*.dump' -mtime +14 -delete
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: khata-backups-data
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: khata-minio-backup
  namespace: khata
spec:
  schedule: "45 18 * * *" # 00:15 IST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: minio-mirror
              image: minio/minio:RELEASE.2025-04-22T22-12-26Z
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: khata-secrets
                      key: S3_ACCESS_KEY_ID
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: khata-secrets
                      key: S3_SECRET_ACCESS_KEY
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: khata-secrets
                      key: S3_BUCKET
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  stamp="$(date -u +%Y%m%dT%H%M%SZ)"
                  target="/backups/khata-minio-${stamp}/${S3_BUCKET}"
                  mc alias set local http://khata-minio.khata.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
                  mkdir -p "$target"
                  mc mirror --overwrite "local/${S3_BUCKET}" "$target"
                  find /backups -mindepth 1 -maxdepth 1 -type d -name 'khata-minio-*' -mtime +14 -exec rm -rf {} \;
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: khata-backups-data
