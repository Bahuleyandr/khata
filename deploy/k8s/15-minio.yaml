apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: khata-minio-data
  namespace: khata
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
  # storageClassName left unset → uses k3s default (local-path-provisioner).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: khata-minio
  namespace: khata
spec:
  replicas: 1
  strategy:
    type: Recreate # single PVC RWO; rolling deadlocks
  selector:
    matchLabels:
      app: khata-minio
  template:
    metadata:
      labels:
        app: khata-minio
    spec:
      # Run non-root (audit 2026-06-19 M13). MinIO runs as any uid; fsGroup 1000
      # chowns the PVC so it can write /data. OPERATOR: a FRESH PVC initializes
      # cleanly; if this PVC was previously written as root, chown /data to
      # 1000:1000 (or recreate) before applying, and confirm Ready on first apply.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            # MinIO uses the same access key + secret as the backend reads from
            # khata-secrets, so one credential pair powers both sides.
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: khata-secrets
                  key: S3_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: khata-secrets
                  key: S3_SECRET_ACCESS_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: khata-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: khata-minio
  namespace: khata
spec:
  selector:
    app: khata-minio
  ports:
    - port: 9000
      targetPort: 9000
      name: api
