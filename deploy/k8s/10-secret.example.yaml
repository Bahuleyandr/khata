# NEVER commit a real version of this file.
#
# Create the actual Secret on the cluster via `make secrets`, which prompts for
# each value and runs `kubectl create secret generic khata-secrets ...` for you.
# This file is committed only as a *shape reference* — the literal values below
# are placeholders and must NOT be applied directly.
apiVersion: v1
kind: Secret
metadata:
  name: khata-secrets
  namespace: khata
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME"
  # Least-privilege app DB role password (audit 2026-06-19 M5). `migrate` (run as
  # the owner) sets the khata_app role's password to this; the backend then
  # connects as khata_app — a DML-only role that cannot disable triggers.
  APP_DB_PASSWORD: "REPLACE_ME"
  TELEGRAM_BOT_TOKEN: "REPLACE_ME"
  ALLOWED_TELEGRAM_USER_IDS: "REPLACE_ME"
  SESSION_SECRET: "REPLACE_ME_64_HEX_CHARS"
  MINIMAX_API_KEY: "REPLACE_ME"
  S3_ENDPOINT: "https://REPLACE.r2.cloudflarestorage.com"
  S3_BUCKET: "khata-statements"
  S3_REGION: "auto"
  S3_ACCESS_KEY_ID: "REPLACE_ME"
  S3_SECRET_ACCESS_KEY: "REPLACE_ME"
