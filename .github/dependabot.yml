version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
      - dependency-name: "eslint"
        update-types:
          - version-update:semver-major
      - dependency-name: "eslint-config-next"
        update-types:
          - version-update:semver-major
      - dependency-name: "next"
        update-types:
          - version-update:semver-major
      - dependency-name: "typescript"
        update-types:
          - version-update:semver-major
      - dependency-name: "vitest"
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend:
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
      - dependency-name: "eslint"
        update-types:
          - version-update:semver-major
      - dependency-name: "node-cron"
        update-types:
          - version-update:semver-major
      - dependency-name: "typescript"
        update-types:
          - version-update:semver-major
      - dependency-name: "vitest"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /deploy
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "node"
        update-types:
          - version-update:semver-major
