name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run secrets:scan

      - name: Production dependency audit
        run: npm run audit:prod

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run
